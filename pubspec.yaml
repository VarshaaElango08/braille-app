name: science_voice_learnings
description: "Science Voice Learning App for visually challenged users"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  shared_preferences: ^2.2.3
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/beep.mp3
    - assets/audio/splash_fantasy.mp3